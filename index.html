<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicConnect AI - Assistant Sandbox</title>
    <style>
        :root {
            --bg-color: #121214;
            --container-bg: #1a1a1e;
            --primary-blue: #0070f3;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border-color: #2e2e33;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 650px;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 600px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user {
            background-color: var(--primary-blue);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            background-color: #27272a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border-color);
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #27272a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-blue);
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0051b3;
        }

        .loading {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>🤖 CivicConnect AI</h2>
        <p>Pilot Program: Town of Greenburgh Navigation Portal</p>
    </div>
    
    <div class="chat-messages" id="chat-messages">
        <div class="message bot">Hello! Ask me any question about Town of Greenburgh services, department locations, or local codes.</div>
    </div>

    <form class="chat-input-area" id="chat-form">
        <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required>
        <button type="submit">Ask Bot</button>
    </form>
</div>

<script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');

    // Toggle this to TRUE once your backend server (Flask/FastAPI/Node) is up and running!
    const isBackendLive = false; 
    const BACKEND_URL = "http://localhost:5000/api/chat"; // Target endpoint URL

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = userInput.value.trim();
        if (!query) return;

        // 1. Append User Message to UI
        appendMessage(query, 'user');
        userInput.value = '';

        // 2. Append Loading Spinner Placeholder
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading';
        loadingDiv.innerText = 'Searching Greenburgh database...';
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // 3. Request Pipeline Logic
        let botResponse = "";

        if (isBackendLive) {
            try {
                // Actual HTTP POST request architecture to talk to your backend
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: query })
                });
                const data = await response.json();
                botResponse = data.answer; 
            } catch (error) {
                botResponse = "⚠️ Connection Error: Unable to communicate with the live RAG backend vector database.";
            }
        } else {
            // Standalone Interactive Mock Mode (Keeps your frontend prototyping moving forward)
            await new Promise(resolve => setTimeout(resolve, 1200)); // Simulate networking latency
            const lowerQuery = query.toLowerCase();

            if (lowerQuery.includes('ethics')) {
                botResponse = "For documentation regarding town ethics, please utilize these official links:\n\n• Code of Ethics: https://www.greenburghny.com/688/Code-of-Ethics\n• Ethics Forms: https://www.greenburghny.com/549/Ethics-Forms";
            } else if (lowerQuery.includes('tree') || lowerQuery.includes('leaf')) {
                botResponse = "The Conservation Advisory Council provides strict guidelines on environmental landscape management:\n\n• Utility Tree Cutting: Chapter 260A regulates utility trimming.\n• Leaf Blowers: Gas-fueled lawn equipment regulations can be found in the CAC resource directory.";
            } else {
                botResponse = `🤖 [Frontend Sandbox Mode Active] Received your query: "${query}". Once your Gemini API rate limit resets, this window will parse live vector chunks directly from the website crawl dataset!`;
            }
        }

        // 4. Remove Loading Indicator and Display Answer
        chatMessages.removeChild(loadingDiv);
        appendMessage(botResponse, 'bot');
    });

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        // Replaces text newlines with HTML breaks to correctly style structured lists
        messageDiv.innerHTML = text.replace(/\n/g, '<br>');
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scrolls to bottom
    }
</script>

</body>
</html>
